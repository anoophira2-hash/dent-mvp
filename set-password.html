<!DOCTYPE html>
<html>
<head>
  <title>Create Password</title>

  <style>
    body{font-family:Arial;padding:40px;background:#f4f4f4}
    .box{max-width:400px;margin:auto;background:#fff;padding:20px;border-radius:10px}
    input{width:100%;padding:10px;margin:10px 0}
    button{width:100%;padding:10px;background:#007bff;color:#fff;border:none}
  </style>
</head>
<body>

<div class="box">
  <h2>Create Password</h2>

  <input id="email" placeholder="Email" readonly>
  <input id="password" type="password" placeholder="Enter Password">

  <button onclick="save()">Save Password</button>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzbSOZmtaY-SnGnC4Iixf3B8nf01pnLenBU2cWY2uo3hFDlbVBYrS9c0G6k-X2Eeg2pQA/exec";

/* AUTO FILL EMAIL FROM LINK */
const params = new URLSearchParams(window.location.search);
const email = params.get("email");

if(email){
  document.getElementById("email").value = email;
}

async function save(){

  const res = await fetch(scriptURL, {
    method:"POST",
    body: JSON.stringify({
      action:"setPassword",
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  if(data.success){
    alert("Password saved successfully!");
  } else {
    alert("Error saving password");
  }
}

</script>

</body>
</html>
