<!DOCTYPE html>
<html>
<head>
  <title>Business Dashboard</title>

  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:30px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:#fff;
      padding:25px;
      border-radius:10px;
    }

    h1,h2{ margin-top:0; }

    input, select, textarea{
      width:100%;
      padding:12px;
      margin:10px 0;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:14px;
      background:#28a745;
      color:white;
      border:none;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#1e7e34;
    }

    .card{
      background:#f8f9fa;
      padding:15px;
      margin-top:15px;
      border-radius:8px;
      border:1px solid #ddd;
    }

    .status{
      font-weight:bold;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Business Dashboard</h1>

  <p>MVP Test Mode</p>

  <hr>

  <h2>Create Shift</h2>

  <select id="profession">
    <option value="">Select Profession</option>
    <option value="Dentist">Dentist</option>
    <option value="Dental Assistant">Dental Assistant</option>
  </select>

  <input type="date" id="shiftDate">
  <input type="time" id="startTime">
  <input type="time" id="endTime">
  <input type="number" id="hours" placeholder="Hours Required">
  <input type="number" id="rate" placeholder="Rate Offered Per Hour">
  <textarea id="notes" placeholder="Shift notes"></textarea>

  <button onclick="createShift()">Post Shift</button>

  <hr>

  <h2>Your Shifts</h2>
  <div id="shiftList"></div>

</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbzbSOZmtaY-SnGnC4Iixf3B8nf01pnLenBU2cWY2uo3hFDlbVBYrS9c0G6k-X2Eeg2pQA/exec";

const businessUser = {
  email: "testbusiness@gmail.com",
  name: "Demo Dental Practice"
};

/* =========================
   CREATE SHIFT (FIXED)
========================= */
async function createShift(){

  const payload = {
    action: "createShift",
    email: businessUser.email,
    name: businessUser.name,
    profession: document.getElementById("profession").value,
    shiftDate: document.getElementById("shiftDate").value,
    startTime: document.getElementById("startTime").value,
    endTime: document.getElementById("endTime").value,
    hours: document.getElementById("hours").value,
    rate: document.getElementById("rate").value,
    notes: document.getElementById("notes").value
  };

  try {

    const res = await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    const data = JSON.parse(text);

    console.log("RESPONSE:", data);

    if(data && data.success){
      alert("Shift posted successfully!");
      loadShifts();
    } else {
      alert("Failed to create shift");
      console.error(data);
    }

  } catch(err){
    console.error("ERROR:", err);
    alert("Server error");
  }
}

/* =========================
   LOAD SHIFTS
========================= */
async function loadShifts(){

  try{

    const res = await fetch(
      scriptURL + "?action=getShifts&email=" + encodeURIComponent(businessUser.email)
    );

    const text = await res.text();
    const data = JSON.parse(text);

    console.log("SHIFTS:", data);

    const container = document.getElementById("shiftList");
    container.innerHTML = "";

    if(!data || data.length === 0){
      container.innerHTML = "<p>No shifts yet.</p>";
      return;
    }

    data.forEach(s => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${s.profession}</h3>
        <p><b>Date:</b> ${s.shiftDate}</p>
        <p><b>Time:</b> ${s.startTime} - ${s.endTime}</p>
        <p><b>Hours:</b> ${s.hours}</p>
        <p><b>Rate:</b> $${s.rate}/hr</p>
        <p><b>Notes:</b> ${s.notes}</p>
        <p class="status">Status: ${s.status}</p>
      `;

      container.appendChild(div);
    });

  } catch(err){
    console.error("LOAD ERROR:", err);
  }
}

/* =========================
   INIT
========================= */
loadShifts();

</script>

</body>
</html>
