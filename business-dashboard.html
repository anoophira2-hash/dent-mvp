<!DOCTYPE html>
<html>
<head>
  <title>Business Dashboard</title>

  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:30px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:10px;
    }

    input, select, textarea{
      width:100%;
      padding:10px;
      margin:10px 0;
    }

    button{
      width:100%;
      padding:12px;
      background:#28a745;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover{
      background:#1e7e34;
    }

    .card{
      background:#f8f9fa;
      padding:10px;
      margin-top:10px;
      border-radius:6px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Business Dashboard</h2>

  <p id="welcome"></p>

  <hr>

  <h3>Create Shift / Job Request</h3>

  <select id="profession">
    <option value="">Select Profession</option>
    <option value="Dentist">Dentist</option>
    <option value="Dental Assistant">Dental Assistant</option>
  </select>

  <textarea id="notes" placeholder="Shift details / requirements"></textarea>

  <button onclick="createShift()">Post Shift</button>

  <hr>

  <h3>Your Shifts</h3>
  <div id="shiftList"></div>

</div>

<script>

const scriptURL =
  "https://script.google.com/macros/s/AKfycbzbSOZmtaY-SnGnC4Iixf3B8nf01pnLenBU2cWY2uo3hFDlbVBYrS9c0G6k-X2Eeg2pQA/exec";

let user = JSON.parse(localStorage.getItem("businessUser") || "{}");

document.getElementById("welcome").innerText =
  "Welcome " + (user.name || "Business");

/* =========================================
   CREATE SHIFT
========================================= */
async function createShift(){

  const profession = document.getElementById("profession").value;
  const notes = document.getElementById("notes").value;

  if(!profession){
    alert("Select profession");
    return;
  }

  const res = await fetch(scriptURL, {
    method:"POST",
    headers: {
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      action:"createShift",
      email:user.email,
      name:user.name,
      profession:profession,
      notes:notes
    })
  });

  const data = await res.json();

  if(data.success){
    alert("Shift posted!");
    loadShifts();
  } else {
    alert("Error posting shift");
  }
}

/* =========================================
   LOAD SHIFTS
========================================= */
async function loadShifts(){

  const res = await fetch(
    scriptURL + "?action=getShifts&email=" + user.email
  );

  const data = await res.json();

  const container = document.getElementById("shiftList");
  container.innerHTML = "";

  data.forEach(s => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${s.profession}</b><br>
      ${s.notes}<br>
      <small>Status: ${s.status}</small>
    `;

    container.appendChild(div);
  });
}

loadShifts();

</script>

</body>
</html>
