<!DOCTYPE html>
<html>
<head>
  <title>Business Dashboard</title>

  <style>

    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:30px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:#fff;
      padding:25px;
      border-radius:10px;
    }

    h1,h2{
      margin-top:0;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:12px;
      margin:10px 0;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:14px;
      background:#28a745;
      color:white;
      border:none;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#1e7e34;
    }

    .card{
      background:#f8f9fa;
      padding:15px;
      margin-top:15px;
      border-radius:8px;
      border:1px solid #ddd;
    }

    .status{
      font-weight:bold;
      margin-top:10px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Business Dashboard</h1>

  <p>
    MVP Test Mode
  </p>

  <hr>

  <h2>Create Shift</h2>

  <!-- PROFESSION -->
  <select id="profession" required>
    <option value="">Select Profession</option>
    <option value="Dentist">Dentist</option>
    <option value="Dental Assistant">Dental Assistant</option>
  </select>

  <!-- DATE -->
  <input type="date" id="shiftDate">

  <!-- START -->
  <input type="time" id="startTime">

  <!-- END -->
  <input type="time" id="endTime">

  <!-- HOURS -->
  <input
    type="number"
    id="hours"
    placeholder="Hours Required"
  >

  <!-- RATE -->
  <input
    type="number"
    id="rate"
    placeholder="Rate Offered Per Hour"
  >

  <!-- NOTES -->
  <textarea
    id="notes"
    placeholder="Shift requirements or notes"
  ></textarea>

  <!-- BUTTON -->
  <button onclick="createShift()">
    Post Shift
  </button>

  <hr>

  <h2>Your Shifts</h2>

  <div id="shiftList"></div>

</div>

<script>

/* =========================================
   APPS SCRIPT URL
========================================= */

const scriptURL =
"https://script.google.com/macros/s/AKfycbzbSOZmtaY-SnGnC4Iixf3B8nf01pnLenBU2cWY2uo3hFDlbVBYrS9c0G6k-X2Eeg2pQA/exec";

/* =========================================
   TEMP BUSINESS USER
========================================= */

const businessUser = {
  email: "testbusiness@gmail.com",
  name: "Demo Dental Practice"
};

/* =========================================
   CREATE SHIFT
========================================= */

async function createShift(){

  try{

    const payload = {

      action: "createShift",

      email: businessUser.email,

      name: businessUser.name,

      profession:
        document.getElementById("profession").value,

      shiftDate:
        document.getElementById("shiftDate").value,

      startTime:
        document.getElementById("startTime").value,

      endTime:
        document.getElementById("endTime").value,

      hours:
        document.getElementById("hours").value,

      rate:
        document.getElementById("rate").value,

      notes:
        document.getElementById("notes").value
    };

    console.log(payload);

    const response = await fetch(scriptURL, {

      method: "POST",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify(payload)

    });

    const data = await response.json();

    console.log(data);

    if(data.success){

      alert("Shift posted successfully!");

      document.getElementById("profession").value = "";
      document.getElementById("shiftDate").value = "";
      document.getElementById("startTime").value = "";
      document.getElementById("endTime").value = "";
      document.getElementById("hours").value = "";
      document.getElementById("rate").value = "";
      document.getElementById("notes").value = "";

      loadShifts();

    } else {

      alert("Failed to create shift");
    }

  } catch(err){

    console.error(err);

    alert("Server error");
  }
}

/* =========================================
   LOAD SHIFTS
========================================= */

async function loadShifts(){

  try{

    const response = await fetch(

      scriptURL +
      "?action=getShifts&email=" +
      encodeURIComponent(businessUser.email)

    );

    const data = await response.json();

    console.log(data);

    const container =
      document.getElementById("shiftList");

    container.innerHTML = "";

    if(data.length === 0){

      container.innerHTML =
        "<p>No shifts posted yet.</p>";

      return;
    }

    data.forEach(shift => {

      const div = document.createElement("div");

      div.className = "card";

      div.innerHTML = `

        <h3>${shift.profession}</h3>

        <p>
          <b>Date:</b> ${shift.shiftDate}
        </p>

        <p>
          <b>Time:</b>
          ${shift.startTime}
          -
          ${shift.endTime}
        </p>

        <p>
          <b>Hours:</b>
          ${shift.hours}
        </p>

        <p>
          <b>Rate:</b>
          $${shift.rate}/hr
        </p>

        <p>
          <b>Notes:</b>
          ${shift.notes}
        </p>

        <p class="status">
          Status:
          ${shift.status}
        </p>

      `;

      container.appendChild(div);

    });

  } catch(err){

    console.error(err);
  }
}

/* =========================================
   INIT
========================================= */

loadShifts();

</script>

</body>
</html>
