<!DOCTYPE html>
<html>
<head>
  <title>Register Candidate</title>
  <script src="app.js"></script>

  <style>
    body{font-family:Arial;background:#f4f4f4;padding:30px}
    .box{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:10px}
    input,select{width:100%;padding:10px;margin:8px 0}
    button{width:100%;padding:12px;background:#007bff;color:#fff;border:none}
  </style>
</head>

<body>

<div class="box">

<h2>Job Seeker Registration</h2>

<input id="name" placeholder="Name">
<input id="surname" placeholder="Surname">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<input id="hourlyRate" placeholder="Hourly Rate">

<!-- PROFESSION DROPDOWN -->
<select id="profession"></select>

<!-- QUESTIONS -->
<input id="q1" placeholder="Q1">
<input id="q2" placeholder="Q2">
<input id="q3" placeholder="Q3">
<input id="q4" placeholder="Q4">
<input id="q5" placeholder="Q5">
<input id="q6" placeholder="Q6">

<!-- FILE UPLOAD -->
<input type="file" id="files" multiple>

<button onclick="submitCandidate()">Submit</button>

</div>

<script>

const scriptURL =
  "https://script.google.com/macros/s/AKfycbzbSOZmtaY-SnGnC4Iixf3B8nf01pnLenBU2cWY2uo3hFDlbVBYrS9c0G6k-X2Eeg2pQA/exec";

window.onload = loadProfessions;

async function loadProfessions(){

  const res = await fetch(scriptURL + "?action=getProfessions");
  const data = await res.json();

  const dropdown = document.getElementById("profession");

  dropdown.innerHTML =
    "<option value=''>Select Profession</option>";

  data.forEach(p => {

    const opt = document.createElement("option");
    opt.value = p.profession;
    opt.textContent = p.profession;

    dropdown.appendChild(opt);
  });
}

/* FILE ENCODER */
function encodeFiles(input){

  return Promise.all(
    [...input.files].map(file => {

      return new Promise(resolve => {

        const reader = new FileReader();

        reader.onload = () => {

          resolve({
            name:file.name,
            type:file.type,
            base64:reader.result.split(",")[1]
          });

        };

        reader.readAsDataURL(file);
      });

    })
  );
}

async function submitCandidate(){

  try{

    let files = [];

    const fileInput =
      document.getElementById("files");

    if(fileInput.files.length > 0){
      files = await encodeFiles(fileInput);
    }

    const res = await fetch(scriptURL, {
      method:"POST",
      body: JSON.stringify({
        action:"registerCandidate",
        name:document.getElementById("name").value,
        surname:document.getElementById("surname").value,
        email:document.getElementById("email").value,
        phone:document.getElementById("phone").value,
        address:document.getElementById("address").value,
        hourlyRate:document.getElementById("hourlyRate").value,
        profession:document.getElementById("profession").value,
        q1:document.getElementById("q1").value,
        q2:document.getElementById("q2").value,
        q3:document.getElementById("q3").value,
        q4:document.getElementById("q4").value,
        q5:document.getElementById("q5").value,
        q6:document.getElementById("q6").value,
        files:files
      })
    });

    const data = await res.json();

    if(data.success){
      alert("Submitted successfully!");
      window.location.href = "index.html";
    } else {
      alert("Submission failed");
    }

  } catch(err){
    console.error(err);
    alert("Error submitting form");
  }
}

</script>

</body>
</html>
