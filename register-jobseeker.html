<!DOCTYPE html>
<html>
<head>
  <title>Job Seeker Registration</title>

  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:30px;
    }

    .container{
      max-width:600px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:10px;
    }

    input,select{
      width:100%;
      padding:10px;
      margin:8px 0;
    }

    button{
      width:100%;
      padding:12px;
      background:#007bff;
      color:#fff;
      border:none;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Job Seeker Registration</h1>

  <form id="candidateForm">

    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="surname" placeholder="Surname" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="text" id="phone" placeholder="Phone" required>
    <input type="text" id="address" placeholder="Address" required>
    <input type="number" id="hourlyRate" placeholder="Hourly Rate" required>

    <select id="profession" required>
      <option value="">Loading professions...</option>
    </select>

    <div id="dynamicQuestions"></div>

    <h3>Upload Files</h3>
    <input type="file" id="files" multiple>

    <br><br>
    <button type="submit">Submit</button>

  </form>

  <br>
  <a href="index.html">Back</a>

</div>

<script>

const scriptURL =
  "https://script.google.com/macros/s/AKfycbzbSOZmtaY-SnGnC4Iixf3B8nf01pnLenBU2cWY2uo3hFDlbVBYrS9c0G6k-X2Eeg2pQA/exec";

/* =========================
   LOAD PROFESSIONS
========================= */
async function loadProfessions(){

  try{

    const res = await fetch(scriptURL + "?action=getProfessions");
    const data = await res.json();

    console.log("PROFESSIONS:", data);

    const dropdown = document.getElementById("profession");

    dropdown.innerHTML =
      "<option value=''>Select Profession</option>";

    data.forEach(p => {

      const opt = document.createElement("option");
      opt.value = p.profession;
      opt.textContent = p.profession;

      dropdown.appendChild(opt);
    });

  } catch(err){
    console.error("Profession load failed:", err);
  }
}

/* =========================
   LOAD QUESTIONS
========================= */
async function loadQuestions(profession){

  try{

    const res = await fetch(scriptURL + "?action=getProfessions");
    const data = await res.json();

    const selected = data.find(p =>
      p.profession === profession
    );

    const container =
      document.getElementById("dynamicQuestions");

    container.innerHTML = "";

    if(!selected) return;

    for(let i=1;i<=6;i++){

      if(selected["q"+i]){

        const input =
          document.createElement("input");

        input.placeholder = selected["q"+i];
        input.id = "q"+i;

        container.appendChild(input);
      }
    }

  } catch(err){
    console.error(err);
  }
}

/* =========================
   FILE ENCODER
========================= */
function encodeFiles(input){

  return Promise.all(
    [...input.files].map(file => {

      return new Promise(resolve => {

        const reader = new FileReader();

        reader.onload = () => {

          resolve({
            name:file.name,
            type:file.type,
            base64:reader.result.split(",")[1]
          });

        };

        reader.readAsDataURL(file);
      });

    })
  );
}

/* =========================
   FORM SUBMIT
========================= */
document.getElementById("candidateForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  try{

    const files =
      await encodeFiles(document.getElementById("files"));

    const payload = {
      action:"registerCandidate",
      name:document.getElementById("name").value,
      surname:document.getElementById("surname").value,
      email:document.getElementById("email").value,
      phone:document.getElementById("phone").value,
      address:document.getElementById("address").value,
      hourlyRate:document.getElementById("hourlyRate").value,
      profession:document.getElementById("profession").value,
      files:files
    };

    const res = await fetch(scriptURL, {
      method:"POST",
      body:JSON.stringify(payload)
    });

    const data = await res.json();

    if(data.success){
      alert("Submitted successfully!");
      window.location.href = "index.html";
    } else {
      alert("Submission failed");
    }

  } catch(err){
    console.error(err);
    alert("Error submitting form");
  }
});

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", () => {

  console.log("PAGE LOADED");

  loadProfessions();

  document.getElementById("profession")
    .addEventListener("change", function(){

      loadQuestions(this.value);
    });

});

</script>

</body>
</html>
