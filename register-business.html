<!DOCTYPE html>
<html>
<head>
  <title>Business Registration</title>

  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:30px;
    }

    .container{
      max-width:600px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:10px;
    }

    input,select{
      width:100%;
      padding:10px;
      margin:8px 0;
    }

    button{
      width:100%;
      padding:12px;
      background:#28a745;
      color:#fff;
      border:none;
      cursor:pointer;
    }

    button:hover{
      background:#1e7e34;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Business Registration</h1>

  <form id="businessForm">

    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="surname" placeholder="Surname" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="text" id="phone" placeholder="Phone" required>

    <input type="text" id="address" placeholder="Business Address" required>
    <input type="text" id="businessName" placeholder="Business Name" required>

    <!-- BUSINESS TYPE DROPDOWN -->
    <select id="businessType" required>
      <option value="">Loading business types...</option>
    </select>

    <!-- FILE UPLOAD -->
    <h3>Upload Documents</h3>
    <input type="file" id="files" multiple>

    <br><br>

    <button type="submit">Submit Business</button>

  </form>

  <br>
  <a href="index.html">Back</a>

</div>

<script>

const scriptURL =
  "https://script.google.com/macros/s/AKfycbzbSOZmtaY-SnGnC4Iixf3B8nf01pnLenBU2cWY2uo3hFDlbVBYrS9c0G6k-X2Eeg2pQA/exec";

/* =========================
   LOAD BUSINESS TYPES
========================= */
async function loadBusinessTypes(){

  try{

    const res = await fetch(scriptURL + "?action=getBusinessTypes");
    const data = await res.json();

    console.log("BUSINESS TYPES:", data);

    const dropdown =
      document.getElementById("businessType");

    dropdown.innerHTML =
      "<option value=''>Select Business Type</option>";

    data.forEach(b => {

      const opt = document.createElement("option");
      opt.value = b.businessType;
      opt.textContent = b.businessType;

      dropdown.appendChild(opt);
    });

  } catch(err){
    console.error("Business type load failed:", err);
  }
}

/* =========================
   FILE ENCODER
========================= */
function encodeFiles(input){

  return Promise.all(
    [...input.files].map(file => {

      return new Promise(resolve => {

        const reader = new FileReader();

        reader.onload = () => {

          resolve({
            name:file.name,
            type:file.type,
            base64:reader.result.split(",")[1]
          });

        };

        reader.readAsDataURL(file);
      });

    })
  );
}

/* =========================
   FORM SUBMIT
========================= */
document.getElementById("businessForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  try{

    const files =
      await encodeFiles(document.getElementById("files"));

    const payload = {
      action:"registerBusiness",
      name:document.getElementById("name").value,
      surname:document.getElementById("surname").value,
      email:document.getElementById("email").value,
      phone:document.getElementById("phone").value,
      address:document.getElementById("address").value,
      businessName:document.getElementById("businessName").value,
      businessType:document.getElementById("businessType").value,
      files:files
    };

    const res = await fetch(scriptURL, {
      method:"POST",
      body:JSON.stringify(payload)
    });

    const data = await res.json();

    if(data.success){
      alert("Business registered successfully!");
      window.location.href = "index.html";
    } else {
      alert("Submission failed");
    }

  } catch(err){
    console.error(err);
    alert("Error submitting form");
  }
});

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", () => {

  console.log("BUSINESS PAGE LOADED");

  loadBusinessTypes();

});

</script>

</body>
</html>
